services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tradicore
      POSTGRES_USER:     tradicore
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradicore -d tradicore"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── DB migrations (runs once on deploy, then exits) ────────────────────────
  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: node src/migrate.js
    env_file: ./api/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  # ── React app (nginx serves the built static files) ────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal

  # ── Express API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./api/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  # ── Caddy — TLS termination, Let's Encrypt, reverse proxy ─────────────────
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./web/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./firstgoldenlogistics:/srv/fgl:ro  # static site served directly by Caddy
      - caddy_data:/data          # TLS certificates — persisted across restarts
      - caddy_config:/config      # Caddy config cache
      - caddy_logs:/var/log/caddy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    networks:
      - internal
    depends_on:
      - web
      - api

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:
